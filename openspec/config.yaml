schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours

context: |
  Tech stack: React + TypeScript frontend-only application.
  UI pattern: Trello-style kanban board with multiple lists and draggable todo cards.
  Data persistence: browser localStorage only; no backend APIs.
  Conventions: deterministic IDs, accessible interactions, modular components/hooks, resilient empty states.

rules:
  proposal:
    - Keep proposals under 500 words
    - Include Goals, Non-goals, User experience, and Success criteria
    - Explicitly cover list/card CRUD, drag-and-drop, and localStorage persistence
  design:
    - Define the board, list, and card data model
    - Describe localStorage hydration, persistence, and versioning
    - Describe drag-and-drop flows, reorder logic, and empty/error states
  tasks:
    - Break tasks into chunks of max 2 hours
    - Include tasks for data layer, CRUD UI, drag-and-drop, persistence, and QA polish
